<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Fortes e Seguras Online</title>
    <meta name="description" content="Crie senhas fortes, seguras e personalizadas gratuitamente. Escolha o tamanho, números, letras maiúsculas e caracteres especiais.">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Pedro Mendes">
    <link rel="canonical" href="https://jpmcdev.github.io/gerador_senhas">
    <meta name="theme-color" content="#09090B">
    <meta property="og:title" content="Gerador de Senhas Fortes e Seguras">
    <meta property="og:description" content="Gere senhas fortes e personalizadas gratuitamente.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jpmcdev.github.io/gerador_senhas">

    <meta property="og:image" content="https://jpmcdev.github.io/gerador_senhas/assets/images/desktop.png">
    <meta property="og:locale" content="pt_BR">
    <!-- Compartilhamento no X/Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Gerador de Senhas Fortes e Seguras">
    <meta name="twitter:description" content="Gere senhas fortes e personalizadas gratuitamente.">
    <meta name="twitter:image" content="https://jpmcdev.github.io/gerador_senhas/assets/images/preview.png">
    <!-- Imports -->
    <link rel="stylesheet" href="assets/css/style.css" class="">
</head>


<body>
    <main class="">
        <navbar class="navSystem">
            <div class="cardSystem">
                <span class="iconSystem">
                    >_
                </span>
                <div class="">
                    <h1 class="titleSystem">Gerador de Senha</h1>
                    <span class="versionSystem">
                        Ver 1.0.1 - JPMCDEV
                    </span>
                </div>
            </div>
            <span class="statusSystem">
                <span class="badgedSystem">
                    <span class=""></span>
                    <!-- <i class="fa-solid fa-circle"></i> -->
                </span>
                System Active
            </span>
        </navbar>

        <div class="cardDefault">
            <span class="titleCard">
                <span class="">
                    <i class="fa-brands fa-expeditedssl"></i>
                    OUTPUT
                </span>
                <span class="">
                    ENTROPY
                </span>
            </span>
            <div class="cardInfo">

            </div>
            <input type="text" class="passwordGenerated inputPass-sm" id="passwordGenerated" autocomplete="off"
                readonly />
            <div class="rangePassword">
                <span class="barPassword">
                    <span class="barPasswordValue"></span>
                </span>
                <label for="passwordLenght" class="labelLenght"></label>
            </div>
            <button class="btnCopyPassword" id="btnCopyPassword"><i class="fa-regular fa-copy"></i>Cópiar Senha</button>
            <button class="btnResetConf"><i class="fa-solid fa-arrows-rotate"></i>Renegerar</button>
            <span class="labelDescription">Tempo estimado para quebra: <span
                    class="labelCardDescription">instantâneo</span></span>
        </div>

        <div class="cardDefault">
            <span class="titleCardSecundary">
                COMPRIMENTO
                <span class="valueRange">4</span>
            </span>
            <input type="range" class="passwordLenght" id="passwordLenght" value="6" min="4" max="128" />
            <span class="labelRange">
                <span>4</span>
                <span>128</span>
            </span>
        </div>

        <div class="cardDefault">
            <div class="cardLineCheckbox">
                <div class="cardCheckbox">
                    <input type="checkbox" class="passwordUppercase inputCheckbox">
                    <div class="">
                        <label for="passwordUppercase" class="">Maísculas</label>
                        <span class="descriptionCheckbox">A-Z</span>
                    </div>
                </div>
                <span class="">
                    <i class="fa-solid fa-lock"></i>
                </span>
            </div>
        </div>

        <div class="cardDefault">
            <div class="cardLineCheckbox">
                <div class="cardCheckbox">
                    <input type="checkbox" class="passwordNumber inputCheckbox">
                    <div class="">
                        <label for="passwordNumber" class="">Números</label>
                        <span class="descriptionCheckbox">1-9</span>
                    </div>
                </div>
                <span class="">
                    <i class="fa-solid fa-lock"></i>
                </span>
            </div>
        </div>

        <div class="cardDefault">
            <div class="cardLineCheckbox">
                <div class="cardCheckbox">
                    <input type="checkbox" class="passwordSymbol inputCheckbox">
                    <div class="">
                        <label for="passwordNumber" class="">Símbolos</label>
                        <span class="descriptionCheckbox">1!@</span>
                    </div>
                </div>
                <span class="">
                    <i class="fa-solid fa-lock"></i>
                </span>
            </div>
        </div>

    </main>




    <script src="https://kit.fontawesome.com/258332114a.js" crossorigin="anonymous"></script>
    <script src="assets/js/script.js"></script>

</body>

</html>
