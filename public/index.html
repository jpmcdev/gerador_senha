<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senha</title>
</head>
<style class="">

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Oswald:wght@300;400;500;600&family=Roboto+Slab:wght@300;400;600&display=swap');

:root {
    --cyan: #00d5bc;
    --white: #ffffff;
    --black: #09090b;
    --gray: #758383;
    --dark-card: #141419;
    --border: rgba(0, 255, 255, 0.35);
    --green: #00ff7f;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    font-size: 16px;
}

body {
    min-height: 100vh;
    background-color: var(--black);
    padding: 40px 20px;
}

button,
input {
    font: inherit;
}

button {
    cursor: pointer;
}

main {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
}

/* Cabeçalho */

.navSystem {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 40px;
}

.cardSystem {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
}

.cardSystem > div {
    min-width: 0;
}

.iconSystem {
    width: 54px;
    height: 54px;
    flex-shrink: 0;
    border: 1px solid rgb(48, 48, 48);
    border-radius: 5px;
    color: var(--cyan);
    background-color: var(--dark-card);
    font-weight: bold;
    font-family: sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
}

.titleSystem {
    font-family: "Orbitron", sans-serif;
    font-size: clamp(0.95rem, 3vw, 1.3rem);
    line-height: 1.3;
    text-transform: uppercase;
    color: var(--white);
    word-break: break-word;
}

.versionSystem {
    display: block;
    margin-top: 5px;
    color: var(--gray);
    font-family: sans-serif;
    font-size: 0.75rem;
    line-height: 1.4;
}

.statusSystem {
    min-width: max-content;
    color: #54bf5c;
    text-transform: uppercase;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 0.7rem;
    border: 1px solid rgb(48, 48, 48);
    border-radius: 20px;
    background-color: var(--dark-card);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.badgedSystem {
    width: 10px;
    height: 10px;
    flex-shrink: 0;
    border-radius: 50%;
    background-color: #54bf5c;
    position: relative;
}

.badgedSystem span {
    position: absolute;
    inset: 0;
    background-color: #54bf5c;
    animation: pulsar 2s infinite;
    border-radius: 50%;
}

@keyframes pulsar {
    to {
        transform: scale(2);
        opacity: 0;
    }
}

/* Cards */

.cardDefault {
    width: 100%;
    border: 1px solid rgb(48, 48, 48);
    border-radius: 8px;
    color: var(--cyan);
    background-color: var(--dark-card);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: clamp(16px, 4vw, 24px);
    margin-bottom: 20px;
}

.titleCard,
.titleCardSecundary {
    width: 100%;
    color: var(--gray);
    text-transform: uppercase;
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}

.titleCard {
    font-size: 0.8rem;
}

.titleCardSecundary {
    font-size: 1rem;
}

.cardDefault input[type="text"] {
    width: 100%;
    min-width: 0;
    background-color: var(--black);
    color: var(--cyan);
    font-size: clamp(1rem, 4vw, 1.5rem);
    font-family: monospace;
    border: 1px solid rgb(48, 48, 48);
    padding: 18px 12px;
    border-radius: 5px;
    font-weight: 500;
    outline: none;
    text-overflow: ellipsis;
}

.cardDefault input[type="text"]:focus {
    border-color: var(--cyan);
}

/* Medidor da senha */

.rangePassword {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 15px 0;
}

.barPassword {
    flex: 1;
    min-width: 0;
    height: 10px;
    background-color: var(--black);
    border-radius: 50px;
    overflow: hidden;
}

.barPasswordValue {
    display: block;
    width: 1%;
    height: 100%;
    background-color: var(--cyan);
    border-radius: inherit;
}

.labelLenght {
    flex-shrink: 0;
    color: var(--cyan);
    font-family: monospace;
    font-weight: 600;
    font-size: 0.9rem;
}

/* Botões */

.btnCopyPassword,
.btnResetConf {
    width: 100%;
    min-height: 50px;
    border-radius: 5px;
    padding: 14px 18px;
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: 600;
    font-size: 1rem;
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    transition:
        transform 0.2s ease,
        opacity 0.2s ease,
        border-color 0.2s ease;
}

.btnCopyPassword {
    background-color: var(--cyan);
    border: 1px solid var(--cyan);
    color: var(--dark-card);
    margin-bottom: 12px;
}

.btnResetConf {
    background-color: #1d1d24;
    border: 1px solid rgb(48, 48, 48);
    color: var(--white);
}

.btnCopyPassword:hover,
.btnResetConf:hover {
    opacity: 0.9;
}

.btnCopyPassword:active,
.btnResetConf:active {
    transform: scale(0.98);
}

.labelDescription {
    display: block;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 0.85rem;
    line-height: 1.5;
    color: var(--gray);
    margin-top: 14px;
}

.labelCardDescription {
    color: var(--cyan);
    font-family: monospace;
    font-weight: 600;
    text-transform: capitalize;
}

/* Range */

.valueRange {
    font-weight: 800;
    font-size: clamp(1.5rem, 5vw, 2rem);
    font-family: monospace;
    color: var(--cyan);
}

    /* Range de comprimento */

.passwordLenght {
    width: 100%;
    height: 8px;
    appearance: none;
    -webkit-appearance: none;
    background-color: var(--black);
    border-radius: 20px;
    accent-color: var(--cyan);
    cursor: pointer;
    padding: 0;
    border: none;
}

.passwordLenght::-webkit-slider-runnable-track {
    width: 100%;
    height: 8px;
    background-color: var(--black);
    border-radius: 20px;
}

.passwordLenght::-webkit-slider-thumb {
    width: 22px;
    height: 22px;
    margin-top: -7px;
    appearance: none;
    -webkit-appearance: none;
    border-radius: 50%;
    background-color: var(--cyan);
    border: 3px solid var(--dark-card);
    cursor: pointer;
}

.passwordLenght::-moz-range-track {
    width: 100%;
    height: 8px;
    background-color: var(--black);
    border-radius: 20px;
}

.passwordLenght::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background-color: var(--cyan);
    border: 3px solid var(--dark-card);
    cursor: pointer;
}

.labelRange {
    width: 100%;
    margin-top: 10px;
    color: var(--gray);
    font-family: monospace;
    display: flex;
    justify-content: space-between;
}

/* Cards de checkbox */

.cardLineCheckbox {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
}

.cardCheckbox {
    display: flex;
    align-items: center;
    gap: 18px;
    min-width: 0;
    font-family: monospace;
}

.cardCheckbox > div {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
}

.cardCheckbox label {
    color: var(--white);
    font-weight: 600;
    font-size: 1.1rem;
    line-height: 1.3;
    cursor: pointer;
}

.descriptionCheckbox {
    display: block;
    color: var(--gray);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 0.8rem;
    line-height: 1.3;
}

.cardLineCheckbox > span {
    flex-shrink: 0;
}

.cardLineCheckbox > span i {
    color: var(--cyan);
    font-size: 1.5rem;
}

/* Checkbox */

input[type="checkbox"] {
    width: 25px;
    height: 25px;
    flex-shrink: 0;
    margin: 0;
    accent-color: var(--cyan);
    cursor: pointer;
}

/* Responsividade para tablets */

@media (max-width: 768px) {
    body {
        padding: 30px 16px;
    }

    main {
        max-width: 100%;
    }

    .navSystem {
        align-items: flex-start;
        margin-bottom: 30px;
    }

    .statusSystem {
        font-size: 0.65rem;
        padding: 7px 10px;
    }

    .cardDefault {
        padding: 18px;
    }

    .cardDefault input[type="text"] {
        padding: 16px 10px;
    }
}

/* Responsividade para celulares */

@media (max-width: 520px) {
    body {
        padding: 24px 12px;
    }

    .navSystem {
        flex-direction: column;
        gap: 18px;
    }

    .cardSystem {
        width: 100%;
    }

    .statusSystem {
        width: auto;
        align-self: flex-start;
    }

    .iconSystem {
        width: 48px;
        height: 48px;
    }

    .titleSystem {
        font-size: 0.95rem;
    }

    .versionSystem {
        font-size: 0.7rem;
    }

    .titleCard,
    .titleCardSecundary {
        flex-wrap: wrap;
    }

    .cardDefault {
        padding: 16px;
        margin-bottom: 15px;
    }

    .cardDefault input[type="text"] {
        font-size: 1rem;
        padding: 15px 10px;
    }

    .rangePassword {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
    }

    .barPassword {
        width: 100%;
        flex: none;
    }

    .labelLenght {
        width: 100%;
        text-align: right;
    }

    .btnCopyPassword,
    .btnResetConf {
        min-height: 48px;
        font-size: 0.95rem;
    }

    .labelDescription {
        font-size: 0.8rem;
    }

    .cardCheckbox {
        gap: 14px;
    }

    .cardCheckbox label {
        font-size: 1rem;
    }

    input[type="checkbox"] {
        width: 23px;
        height: 23px;
    }

    .cardLineCheckbox > span i {
        font-size: 1.3rem;
    }
}

/* Celulares pequenos */

@media (max-width: 360px) {
    body {
        padding: 18px 10px;
    }

    .cardDefault {
        padding: 14px;
    }

    .cardSystem {
        gap: 9px;
    }

    .iconSystem {
        width: 44px;
        height: 44px;
    }

    .titleSystem {
        font-size: 0.82rem;
    }

    .statusSystem {
        font-size: 0.6rem;
    }

    .titleCard,
    .titleCardSecundary {
        font-size: 0.75rem;
    }

    .cardCheckbox label {
        font-size: 0.95rem;
    }

    .descriptionCheckbox {
        font-size: 0.72rem;
    }
}
</style>

<body>
    <main class="">
        <navbar class="navSystem">
            <div class="cardSystem">
                <span class="iconSystem">
                    >_
                </span>
                <div class="">
                    <h1 class="titleSystem">Gerador de Senha</h1>
                    <span class="versionSystem">
                        Ver 1.0.1 - JPMCDEV
                    </span>
                </div>
            </div>
            <span class="statusSystem">
                <span class="badgedSystem">
                    <span class=""></span>
                    <!-- <i class="fa-solid fa-circle"></i> -->
                </span>
                System Active
            </span>
        </navbar>

        <div class="cardDefault">
            <span class="titleCard">
                <span class="">
                    <i class="fa-brands fa-expeditedssl"></i>
                    OUTPUT
                </span>
                <span class="">
                    ENTROPY
                </span>
            </span>
            <input type="text" class="passwordGenerated" id="passwordGenerated" autocomplete="off" readonly />
            <div class="rangePassword">
                <span class="barPassword">
                    <span class="barPasswordValue"></span>
                </span>
                <label for="passwordLenght" class="labelLenght"></label>
            </div>
            <button class="btnCopyPassword" id="btnCopyPassword"><i class="fa-regular fa-copy"></i>Cópiar Senha</button>
            <button class="btnResetConf"><i class="fa-solid fa-arrows-rotate"></i>Renegerar</button>
            <span class="labelDescription">Tempo estimado para quebra: <span class="labelCardDescription">instantâneo</span></span>
        </div>

        <div class="cardDefault">
                <span class="titleCardSecundary">
                    COMPRIMENTO
                    <span class="valueRange">4</span>
                </span>
                <input type="range" class="passwordLenght" id="passwordLenght" value="4" min="4" max="128" />
                <span class="labelRange">
                    <span>4</span>
                    <span>128</span>
                </span>
        </div>

        <div class="cardDefault">
            <div class="cardLineCheckbox">
                <div class="cardCheckbox">
                    <input type="checkbox" class="passwordUppercase inputCheckbox" checked>
                    <div class="">
                        <label for="passwordUppercase" class="">Maísculas</label>
                        <span class="descriptionCheckbox">A-Z</span>
                    </div>
                </div>
                <span class="">
                    <i class="fa-solid fa-lock"></i>
                </span>
            </div>
        </div>

        <div class="cardDefault">
            <div class="cardLineCheckbox">
                <div class="cardCheckbox">
                    <input type="checkbox" class="passwordNumber inputCheckbox" checked>
                    <div class="">
                        <label for="passwordNumber" class="">Números</label>
                        <span class="descriptionCheckbox">1-9</span>
                    </div>
                </div>
                <span class="">
                    <i class="fa-solid fa-lock"></i>
                </span>
            </div>
        </div>

        <div class="cardDefault">
            <div class="cardLineCheckbox">
                <div class="cardCheckbox">
                    <input type="checkbox" class="passwordSymbol inputCheckbox" checked>
                    <div class="">
                        <label for="passwordNumber" class="">Símbolos</label>
                        <span class="descriptionCheckbox">1!@</span>
                    </div>
                </div>
                <span class="">
                    <i class="fa-solid fa-lock"></i>
                </span>
            </div>
        </div>
        
    </main>


    <script src="https://kit.fontawesome.com/258332114a.js" crossorigin="anonymous"></script>
    <script class="">

        // Input Password
        const passwordGenerated = document.querySelector("#passwordGenerated");
        // Range Password
        const passwordLenght = document.querySelector("#passwordLenght");
        // Button Copy Password
        const btnCopyPassword = document.querySelector('#btnCopyPassword');
        // View Value Range
        const viewValueRange = document.querySelector('.valueRange');
        // Bar Value Range
        const barValueRange = document.querySelector(".barPasswordValue")
        // Count Range Default
        let valueRangePassword = 4;

        const labelLenght = document.querySelector(".labelLenght")
        // Checkbox Adjust Password
        const chkSymbol = document.querySelector(".passwordSymbol");
        const chkUppercase = document.querySelector(".passwordUppercase");
        const chkNumber = document.querySelector(".passwordNumber");
        // Values Types Caracter Passwords
        const textLowercase = "abcdefghjlmnpqrstuvwxyz"
        const textUppercase = "ABCDEFGHJLMNPQRSTUVWXYZ";
        const textNumber = "123456789"; 
        const textSymbol = "?!@#&*()[]";

        // -------------FUNCTION-------------------------

        // Function Generated Password
        const generatedPassword = () => {

            // Model Default Caracter
            let chars = textLowercase;

            // Verifica se os Checkbo estão marcados
            chkUppercase.checked ? chars += textUppercase : chars;
            
            chkNumber.checked ? chars += textNumber : chars;

            chkSymbol.checked ? chars += textSymbol : chars;


            let password = "";

            for (let c = 0; c < valueRangePassword; c++) {
                const randomPassword = Math.floor(Math.random() * chars.length);
                password += chars.substring(randomPassword, randomPassword + 1); 
            }

            passwordGenerated.value = password;
        }


        // Function Event Change Range
        passwordLenght.addEventListener("input", () => {

            valueRangePassword = passwordLenght.value;

            valorRange = Number(passwordLenght.value);

            if(valorRange <= 20) {
                passwordGenerated.style = "font-size: 2rem";
                barValueRange.style = "width: 33%";
                labelLenght.innerHTML = "Normal";
            } else if(valorRange <= 60){
                passwordGenerated.style = "font-size: 1.5rem";
                barValueRange.style = "width: 66%";
                labelLenght.innerHTML = "Razoável";
            } else if(valorRange <= 100){
                passwordGenerated.style = "font-size: 0.7rem";
                barValueRange.style = "width: 100%";
                labelLenght.innerHTML = "Inquebrável";
            }

            viewValueRange.innerHTML = valorRange;

            generatedPassword();

        })

        // Function Event Click Checkbox
        chkUppercase.addEventListener("click", generatedPassword);
        chkNumber.addEventListener("click", generatedPassword);
        chkSymbol.addEventListener("click", generatedPassword);

        // Event Click Copy Password
        btnCopyPassword.addEventListener("click", () => {
            navigator.clipboard.writeText(passwordGenerated.value);
        });

        // Exec Function Generated Password
        generatedPassword();

    </script>

</body>

</html>
